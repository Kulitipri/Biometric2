# RMFRD config: real-world masked face validation (per proposal §3, role #2).
# Run: python eval/run_experiment.py --config configs/rmfrd.yaml
# Override để swap model: --override model.name=lvface model.weights=weights/lvface.onnx
#
# RMFRD AFDB pre-cropped face ~130x140 — detector defaults (640x640, thresh=0.5)
# fail 100% vì upscale 4.6x làm blur quá nặng. Empirical (scripts/test_rmfrd_detect.py):
# det_size=320 + thresh=0.3 detect được 100% mà không cần padding hack.
# align_mode='resize' đã thử: detection bypass nhưng Rank-1 chỉ 6.52% — ArcFace
# yêu cầu 5-landmark alignment cứng, resize-only không đủ.

model:
  name: arcface
  weights: weights/arcface_r100.onnx
  embedding_dim: 512
  device: cuda
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  tta: false

detector:
  det_size: [320, 320]     # nhỏ hơn 640: giảm upscale ratio cho ảnh tight-crop
  ctx_id: 0
  det_thresh: 0.3          # thấp hơn 0.5: detection score giảm khi upscale
  align_size: 112
  align_mode: detect       # full pipeline (detect + 5-landmark affine)
  fallback_align_mode: null  # 'resize' = nếu detect fail, encode bằng resize ảnh gốc
  pad_ratio: 0.0

dataset:
  name: rmfrd
  root: data/rmfrd/self-built-masked-face-recognition-dataset
  # LFW-only fields (unused cho rmfrd, vẫn cần để build_dataset swallow):
  raw_root: data/lfw/lfw-deepfunneled
  masked_root: data/lfw/masked
  mask_suffix: _surgical
  batch_size: 64
  num_workers: 4
  gallery_size: null       # null = dùng tất cả identity hợp lệ
  gallery_shots: 1
  # Allowlist case-insensitive — RMFRD AFDB chứa lẫn .jpg/.jpeg/.png.
  # Bỏ qua flag này thì loader chỉ bắt ~376 ID / 1871 masked probe; bật full
  # → khoảng 403 ID / 1945 probe.
  allowed_extensions: [.jpg, .jpeg, .png, .bmp]
  mask_gallery: false
  mask_gallery_suffix: _surgical
  quality_weighted: false
  seed: 42

matcher:
  threshold: 0.4
  top_k: 5

eval:
  far_targets: [0.001, 0.01, 0.1]
  cmc_max_rank: 20
  measure_latency: true
  latency_warmup: 10
  latency_iters: 1000

experiment:
  output_dir: experiments
  seed: 42
  tag: "rmfrd"
