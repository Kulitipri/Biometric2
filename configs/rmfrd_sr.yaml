# RMFRD + Lever A (CodeFormer face restoration) — phá trần resolution.
# = rmfrd_clean (K=5 ensemble + clean subset, baseline 0.6123) + restorer ON.
#
# Mục tiêu: phục chế mặt nhỏ (< min_short_side) trước detect+align xem có vượt
# baseline 0.6123 không. So sánh apples-to-apples:
#   python eval/run_experiment.py --config configs/rmfrd_clean.yaml   # baseline
#   python eval/run_experiment.py --config configs/rmfrd_sr.yaml      # + restoration
#
# Pre-req:
#   1. pip install codeformer-pip   (hoặc: git clone CodeFormer vào third_party/
#      + pip install basicsr facexlib — xem hướng dẫn trong src/restorer.py)
#   2. Tải weight: weights/codeformer.pth
#      https://github.com/sczhou/CodeFormer/releases/download/v0.1.0/codeformer.pth
#
# Tune nhanh fidelity (ít hallucinate hơn → an toàn identity hơn):
#   python eval/run_experiment.py --config configs/rmfrd_sr.yaml --override restorer.fidelity=0.9
# Đổi ngưỡng kích thước (restore nhiều/ít ảnh hơn):
#   python eval/run_experiment.py --config configs/rmfrd_sr.yaml --override restorer.min_short_side=80

model:
  name: ensemble
  embedding_dim: 512
  device: cuda
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  members:
    - {name: arcface, weights: weights/arcface_r100.onnx, tta: true}
    - {name: lvface,  weights: weights/lvface.onnx,       tta: true}

detector:
  det_size: [320, 320]
  ctx_id: 0
  det_thresh: 0.3
  align_size: 112
  align_mode: detect
  fallback_align_mode: resize
  pad_ratio: 0.0

restorer:
  enabled: true
  weights: weights/codeformer.pth
  min_short_side: 100
  fidelity: 0.7
  device: cuda

dataset:
  name: rmfrd
  root: data/rmfrd/self-built-masked-face-recognition-dataset
  raw_root: data/lfw/lfw-deepfunneled
  masked_root: data/lfw/masked
  mask_suffix: _surgical
  batch_size: 64
  num_workers: 4
  gallery_size: null
  gallery_shots: 5
  allowed_extensions: [.jpg, .jpeg, .png, .bmp]
  mask_gallery: false
  mask_gallery_suffix: _surgical
  identity_allowlist: data/rmfrd/clean_identities.txt
  quality_weighted: false
  seed: 42

matcher:
  threshold: 0.4
  top_k: 5

eval:
  far_targets: [0.001, 0.01, 0.1]
  cmc_max_rank: 20
  measure_latency: true
  latency_warmup: 10
  latency_iters: 1000

experiment:
  output_dir: experiments
  seed: 42
  tag: "rmfrd_sr"
