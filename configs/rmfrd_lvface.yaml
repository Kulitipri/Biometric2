# RMFRD + LVFace K=1 (single-model specialist trên masked face).
# Run: python eval/run_experiment.py --config configs/rmfrd_lvface.yaml
#
# Mục tiêu: thay ArcFace bằng LVFace để xem masked-specialist có thắng baseline
# không, giữ nguyên detector/dataset config với configs/rmfrd.yaml.

model:
  name: lvface
  weights: weights/lvface.onnx
  embedding_dim: 512
  device: cuda
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  tta: false

detector:
  det_size: [320, 320]
  ctx_id: 0
  det_thresh: 0.3
  align_size: 112
  align_mode: detect
  fallback_align_mode: null
  pad_ratio: 0.0           # cho phép --override detector.pad_ratio=0.2

dataset:
  name: rmfrd
  root: data/rmfrd/self-built-masked-face-recognition-dataset
  raw_root: data/lfw/lfw-deepfunneled
  masked_root: data/lfw/masked
  mask_suffix: _surgical
  batch_size: 64
  num_workers: 4
  gallery_size: null
  gallery_shots: 1
  allowed_extensions: [.jpg, .jpeg, .png, .bmp]
  mask_gallery: false
  mask_gallery_suffix: _surgical
  quality_weighted: false
  seed: 42

matcher:
  threshold: 0.4
  top_k: 5

eval:
  far_targets: [0.001, 0.01, 0.1]
  cmc_max_rank: 20
  measure_latency: true
  latency_warmup: 10
  latency_iters: 1000

experiment:
  output_dir: experiments
  seed: 42
  tag: "rmfrd_lvface"
