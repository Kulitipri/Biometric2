# RMFRD full-stack: ensemble (ArcFace+LVFace) + K=3 multi-shot + TTA + fallback.
# Run: python eval/run_experiment.py --config configs/rmfrd_full.yaml
#
# Đây là config kỳ vọng cho headline RMFRD report — gom tất cả cải tiến hợp lệ:
#  - Ensemble: 2 backbone bổ trợ nhau.
#  - K=3: mỗi identity có 3 prototype ảnh unmasked thay vì 1.
#  - TTA: forward gốc + flip → tăng robustness, gấp đôi inference cost.
#  - fallback_align_mode='resize': probe detect-fail vẫn được encode, giảm
#    skip rate (tránh "ảo giác" Rank-1 cao khi probe khó bị âm thầm loại).
#
# Lưu ý: K=3 sẽ drop các identity có <4 ảnh unmasked. Số identity hợp lệ giảm
# nhưng đây là trade-off cố ý — multi-shot là cải tiến đúng cho use-case phone
# unlock (enroll nhiều ảnh).

model:
  name: ensemble
  embedding_dim: 512
  device: cuda
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  members:
    - {name: arcface, weights: weights/arcface_r100.onnx, tta: true}
    - {name: lvface,  weights: weights/lvface.onnx,       tta: true}

detector:
  det_size: [320, 320]
  ctx_id: 0
  det_thresh: 0.3
  align_size: 112
  align_mode: detect
  fallback_align_mode: resize
  pad_ratio: 0.0

dataset:
  name: rmfrd
  root: data/rmfrd/self-built-masked-face-recognition-dataset
  raw_root: data/lfw/lfw-deepfunneled
  masked_root: data/lfw/masked
  mask_suffix: _surgical
  batch_size: 64
  num_workers: 4
  gallery_size: null
  gallery_shots: 3
  allowed_extensions: [.jpg, .jpeg, .png, .bmp]
  mask_gallery: false
  mask_gallery_suffix: _surgical
  quality_weighted: false
  seed: 42

matcher:
  threshold: 0.4
  top_k: 5

eval:
  far_targets: [0.001, 0.01, 0.1]
  cmc_max_rank: 20
  measure_latency: true
  latency_warmup: 10
  latency_iters: 1000

experiment:
  output_dir: experiments
  seed: 42
  tag: "rmfrd_full"
