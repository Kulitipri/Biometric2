# RMFRD clean-subset headline — = rmfrd_k5_ablation (K=5 ensemble, điểm cao
# nhất hiện tại) + giới hạn về subset "clean" qua gallery self-consistency.
#
# Vì sao tách config riêng: chỉ khác k5_ablation đúng 1 dòng (identity_allowlist)
# → đặt cạnh nhau cho phép so sánh apples-to-apples "tác động của clean".
#
# KHÁC với audit_rmfrd_label_noise.py: allowlist sinh từ tín hiệu unmasked-vs-
# unmasked (folder có thuần 1 người không), ĐỘC LẬP với probe matching → Rank-1
# sau clean KHÔNG circular.
#
# Pre-req (sinh allowlist; chọn cutoff từ phân phối audit, đừng hardcode):
#   python scripts/build_clean_rmfrd_subset.py --config configs/rmfrd_k5_ablation.yaml
#   # xem phân phối mean_intra / outlier_rate → chốt cutoff → chạy lại:
#   python scripts/build_clean_rmfrd_subset.py --config configs/rmfrd_k5_ablation.yaml \
#       --min-mean-intra <x> --max-outlier-rate <y> \
#       --allowlist-output data/rmfrd/clean_identities.txt
#
# Run:
#   python eval/run_experiment.py --config configs/rmfrd_clean.yaml

model:
  name: ensemble
  embedding_dim: 512
  device: cuda
  providers:
    - CUDAExecutionProvider
    - CPUExecutionProvider
  members:
    - {name: arcface, weights: weights/arcface_r100.onnx, tta: true}
    - {name: lvface,  weights: weights/lvface.onnx,       tta: true}

detector:
  det_size: [320, 320]
  ctx_id: 0
  det_thresh: 0.3
  align_size: 112
  align_mode: detect
  fallback_align_mode: resize
  pad_ratio: 0.0

dataset:
  name: rmfrd
  root: data/rmfrd/self-built-masked-face-recognition-dataset
  raw_root: data/lfw/lfw-deepfunneled
  masked_root: data/lfw/masked
  mask_suffix: _surgical
  batch_size: 64
  num_workers: 4
  gallery_size: null
  gallery_shots: 5
  allowed_extensions: [.jpg, .jpeg, .png, .bmp]
  mask_gallery: false
  mask_gallery_suffix: _surgical
  # Label-noise clean subset (gallery self-consistency). Sinh bằng
  # scripts/build_clean_rmfrd_subset.py. Để null = full RMFRD (= k5_ablation).
  identity_allowlist: data/rmfrd/clean_identities.txt
  quality_weighted: false
  seed: 42

matcher:
  threshold: 0.4
  top_k: 5

eval:
  far_targets: [0.001, 0.01, 0.1]
  cmc_max_rank: 20
  measure_latency: true
  latency_warmup: 10
  latency_iters: 1000

experiment:
  output_dir: experiments
  seed: 42
  tag: "rmfrd_clean"
